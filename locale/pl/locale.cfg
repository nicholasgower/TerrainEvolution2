[mod-setting-description]
minimal_pollution=Przy zanieczyszczeniu powyżej tego poziomu gleba będzie stopniowo ulegać degradacji zgodnie z następującym schematem: trawa -> ziemia -> pustynia -> piasek -> pustkowie. Zanieczyszczenie jest obliczane osobno dla każdego losowego bloku
nature_events_every=60 ticków to jedna sekunda. W przypadku dużych baz lepiej zwiększyć tę wartość
flood=W zanieczyszczonych obszarach przybrzeżnych będą sporadycznie występować powodzie. Woda pojawia się tylko na komórkach zdegradowanych do pustkowi. Wzmocnij brzeg dowolną osłoną
drought=Silnie zanieczyszczone tereny przybrzeżne będą czasami wysychać
fire=Drzewa na skażonych obszarach będą czasami się zapalać
more_agressive_base_chunks=W tym trybie istnieje dodatkowy cykl przez bloki, które zawierają budynki gracza. Jeśli cała twoja baza jest pokryta jakąkolwiek osłoną, ten tryb nie ma większego sensu
chunks=Ile bloków przetwarzać co "n" taktów
new_trees_chance=
new_trees_count=
max_trees_count=Maksymalna liczba drzew na obszarze o promieniu 16 komórek
template=Sposób rozprzestrzeniania się drzew\nLosowo - drzewa mogą rosnąć na dowolnej wolnej komórce\nRzadki las - drzewa rosną w dużej odległości od siebie\nLas - drzewa rosną w niewielkiej odległości od siebie\nGęsty las - drzewa rosną tak gęsto, jak to możliwe
trees_evolution_chance=
trees_evolution_count=Drzewa stopniowo zmieniają kolor i wysychają. Liczba pokazuje, ile drzew w bloku na przejście ulegnie ewolucji
trees_rotted_chance=
trees_rotted_count=Martwe drzewa ulegają rozkładowi, wzbogacając glebę. Liczba ta pokazuje, ile drzew wzbogaci glebę
hello_Ripley=Krew chrząszcza niszczy wszelką roślinność, ale wzbogaca glebę
trees_rotted_tiles=Ile komórek zostanie zaznaczonych podczas rozkładu drzewa
weathering_of_cliffs=Kiedy drzewo w pobliżu skały uschnie, istnieje 5% szansy, że komórka skały zniknie
dynamic_daily_cycle=Dodaje do gry cykl roczny. Czas trwania dnia, nocy i zmierzchu jest obliczany osobno dla każdego dnia. Aby uprościć obliczenia, rok trwa 360 dni, a miesiąc 30 dni. Katastrofa miała miejsce 1 dnia pierwszego roku. 90. i 270. dzień – równonoc, 180. – przesilenie letnie, 360. – przesilenie zimowe. \n Ustawienia wstępne: \n Zima nadchodzi – przez pół roku dzień jest bardzo krótki, przez pół roku noc jest bardzo krótka \n Śródziemie – cykle dobowe jak w średnich szerokościach geograficznych \n Równik – domyślny świat Factorio z krótkimi nocami i zmierzchem bez dynamicznej zmiany czasu trwania
the_night_is_dark_and_full_of_terror=Sprawia, że noce są wizualnie ciemniejsze o określoną liczbę procent. 0 – wartość domyślna w grze. Dynamiczna – ciemność nocy jest obliczana osobno dla każdego dnia, od minimum do maksimum

